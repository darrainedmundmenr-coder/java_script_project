<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Whack-a-Mole</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="menu" class="menu">
    <h1>Whack-a-Mole</h1>
    <button onclick="startGame('classic')">Classic Mode</button>
    <button onclick="startGame('challenge')">Challenge Mode</button>
  </div>

  <div id="game" class="container" style="display: none;">

    <div class="sidebar">
      
      <div class="game-ui">
        <h2>Score: <span id="score">0</span></h2>
        <h2>Time: <span id="time-left">60</span></h2>
      </div>

      <div id="lives-container">
        <img src="heart.png" class="heart">
        <img src="heart.png" class="heart">
        <img src="heart.png" class="heart">
      </div>

      <div class="controls-panel">
        <button id="btn-pause" onclick="pauseGame()">Pause</button>
        <button id="btn-resume" onclick="resumeGame()" style="display: none;">Resume</button>
        <button id="btn-restart" onclick="restartGame()">Restart</button>
        <button id="btn-exit" onclick="exitGame()">Exit</button>
      </div>

    </div>

    <div class="grid">
      <div class="square" id="1"></div>
      <div class="square" id="2"></div>
      <div class="square" id="3"></div>
      <div class="square" id="4"></div>
      <div class="square" id="5"></div>
      <div class="square" id="6"></div>
      <div class="square" id="7"></div>
      <div class="square" id="8"></div>
      <div class="square" id="9"></div>
    </div>

  </div>

  <script src="New folder (2)/jquery-4.0.0.js"></script>
  <script src="app.js"></script>
</body>
</html>

        // Functions to convert temperatures
function celsiusToFahrenheit(celsius) {
    return (celsius * 9 / 5) + 32;
}

function fahrenheitToCelsius(fahrenheit) {
    return (fahrenheit - 32) * 5 / 9;
}

function kelvinToCelsius(kelvin) {
    return kelvin - 273.15;
}

// Prompt the user
document.write("Convert your temperatures here!<br>");

var ask = parseInt(prompt("Choose conversion:\n1 - Celsius to Fahrenheit\n2 - Fahrenheit to Celsius\n3 - Kelvin to Celsius"));

if (ask == 1) {
    var celsius = parseFloat(prompt("Enter temperature in Celsius:"));
    var fahrenheit = celsiusToFahrenheit(celsius);
    document.write(celsius + "°C = " + fahrenheit.toFixed(2) + "°F");
} else if (ask == 2) {
    var fahrenheit = parseFloat(prompt("Enter temperature in Fahrenheit:"));
    var celsius = fahrenheitToCelsius(fahrenheit);
    document.write(fahrenheit + "°F = " + celsius.toFixed(2) + "°C");
} else if (ask == 3) {
    var kelvin = parseFloat(prompt("Enter temperature in Kelvin:"));
    var celsius = kelvinToCelsius(kelvin);
    document.write(kelvin + "K = " + celsius.toFixed(2) + "°C");
} else {
    document.write("Invalid choice!");
}
